<mat-toolbar class="navbar">
  <div class="navbar__inner">
    <a class="navbar__brand" routerLink="/">
      <span class="navbar__brand-mark">S4F</span>
      <span class="navbar__brand-name">Solutions4Future</span>
    </a>

    <nav class="navbar__links">
      @for (link of links; track link.path) {
        <a
          class="navbar__link"
          [routerLink]="link.path"
          routerLinkActive="navbar__link--active"
          [routerLinkActiveOptions]="{ exact: link.path === '/' }"
        >
          {{ link.label }}
        </a>
      }
      <a routerLink="/contact" mat-flat-button color="primary" class="navbar__cta">
        Get a Consultation
      </a>
    </nav>

    <button
      class="navbar__toggle"
      mat-icon-button
      [matMenuTriggerFor]="mobileMenu"
      aria-label="Open navigation menu"
    >
      <mat-icon>menu</mat-icon>
    </button>

    <mat-menu #mobileMenu="matMenu">
      @for (link of links; track link.path) {
        <a mat-menu-item [routerLink]="link.path" routerLinkActive="navbar__link--active">
          {{ link.label }}
        </a>
      }
      <a mat-menu-item routerLink="/contact">Get a Consultation</a>
    </mat-menu>
  </div>
</mat-toolbar>
